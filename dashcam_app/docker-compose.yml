services:
  dashcam:
    build: .
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    ports:
      - "5001:5001"
    environment:
      - VIDEO_SOURCE=/dev/video0
      - DEV_VIDEO_PATH=/app/recordings/dashcam_20260521_103322.avi
      - DEVICE=0
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data/weights:/app/data/weights
      - ./recordings:/app/recordings
      - ./dashcam.py:/app/dashcam.py
      - ./yolop_detector.py:/app/yolop_detector.py
      - ./trt_runner.py:/app/trt_runner.py
      - ./build_engines.py:/app/build_engines.py
      - ./models:/app/models
      - ./templates:/app/templates
      - jetson-networks:/usr/local/bin/networks
    # devices:
    #   - /dev/video0:/dev/video0
    restart: unless-stopped

volumes:
  jetson-networks:
