services:
  dashcam:
    build: .
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    ports:
      - "5001:5001"
    environment:
      - VIDEO_SOURCE=/dev/video0
      - DEV_VIDEO_PATH=/app/recordings/dashcam_20260521_103322.avi
      - DEVICE=0
      - PYTHONUNBUFFERED=1
      # DeepStream config
      - DISPLAY=:0
      - GST_DEBUG=0
    volumes:
      - ./recordings:/app/recordings
      - ../weights:/app/weights
      - ./dashcam.py:/app/dashcam.py
      - ./trt_runner.py:/app/trt_runner.py
      - ./twinlite_detector.py:/app/twinlite_detector.py
      - ./fcn_detector.py:/app/fcn_detector.py
      - ./bevformer_detector.py:/app/bevformer_detector.py
      - ./deepstream_pipeline.py:/app/deepstream_pipeline.py
      - ./adas_postprocessor.py:/app/adas_postprocessor.py
      - ./build_engines.py:/app/build_engines.py
      - ./models:/app/models
      - ./templates:/app/templates
      - jetson-networks:/usr/local/bin/networks
    # devices:
    #   - /dev/video0:/dev/video0
    restart: unless-stopped

volumes:
  jetson-networks:
